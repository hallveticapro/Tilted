services:
  tilted:
    image: ${TILTED_IMAGE:-tilted:latest}
    build:
      context: .
    container_name: tilted
    ports:
      - "8080:8080"
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp:size=16m,mode=1777
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
