server {
  listen 8080;
  listen [::]:8080;
  server_name _;
  server_tokens off;

  root /usr/share/nginx/html;
  index index.html;

  add_header Content-Security-Policy "default-src 'self'; base-uri 'self'; connect-src 'self'; font-src 'self'; frame-ancestors 'none'; img-src 'self' data: https:; object-src 'none'; script-src 'self'; style-src 'self'; worker-src 'self'" always;
  add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=(), usb=()" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header X-Frame-Options "DENY" always;

  location = /healthz {
    access_log off;
    default_type text/plain;
    return 200 "ok\n";
  }

  location = /sw.js {
    try_files $uri =404;
    expires -1;
  }

  location ~* ^/(?:favicon(?:-96x96)?\.(?:ico|png|svg)|apple-touch-icon\.png|site\.webmanifest|web-app-manifest-\d+x\d+\.png)$ {
    try_files $uri =404;
    expires 7d;
  }

  location /assets/ {
    try_files $uri =404;
    expires 1y;
  }

  location / {
    try_files $uri $uri/ /index.html;
    expires -1;
  }
}
